function initHeroCarousel() {
  const track = document.getElementById('carousel-track');
  const container = document.getElementById('hero-carousel');
  const dotsContainer = document.getElementById('carousel-dots');
  if (!track || !container || !dotsContainer) return;

  const destaques = [
    { 
      titulo: "Elefante Branco", 
      url: "posts/elefante-branco/index.html", 
      imagem: "https://ik.imagekit.io/3rkd7yyex/Deriva/gaivotas.webp?updatedAt=1782182322064",
      resumo: "Eu te amo — disse ele ao meu ouvido antes de soltar minha mão e correr para seu ônibus..."
    },
    { 
      titulo: "A Viagem", 
      url: "posts/a-viagem/index.html", 
      imagem: "https://ik.imagekit.io/3rkd7yyex/Deriva/littleme.webp?updatedAt=1782182320195",
      resumo: "Aquela solidão que sentia não era de toda ingrata naquele momento..."
    }
  ];

  track.innerHTML = '';
  dotsContainer.innerHTML = '';

  destaques.forEach((post, index) => {
    track.innerHTML += `
        <div class="carousel-slide">
            <div class="carousel-image-wrap">
                <img src="${post.imagem}" alt="${post.titulo}">
            </div>
            <div class="carousel-text-overlay feed__content">
                <header>
                    <h2 class="feed__title">
                        <a href="${post.url}">${post.titulo}</a>
                    </h2>
                </header>
                <p>${post.resumo}</p>
            </div>
        </div>`;
    
    dotsContainer.innerHTML += `<span class="carousel-dot ${index === 0 ? 'active' : ''}" data-index="${index}"></span>`;
  });

  let currentIndex = 0;
  const dots = dotsContainer.querySelectorAll('.carousel-dot');
  
  let autoplayTimer;
  const tempoTransicao = 5000; 

  function updateCarousel(index) {
    currentIndex = index;
    track.style.transform = `translateX(-${currentIndex * 100}%)`;
    dots.forEach(d => d.classList.remove('active'));
    if (dots[currentIndex]) dots[currentIndex].classList.add('active');
  }

  function startAutoplay() {
    autoplayTimer = setInterval(() => {
      updateCarousel((currentIndex + 1) % destaques.length);
    }, tempoTransicao);
  }

  function resetAutoplay() {
    clearInterval(autoplayTimer);
    startAutoplay();
  }

  // Swipe Mobile
  let startX = 0, startY = 0;
  let currentX = 0, currentY = 0;
  let isDragging = false;

  function dragStart(e) {
    isDragging = true;
    clearInterval(autoplayTimer);
    startX = e.touches[0].pageX;
    startY = e.touches[0].pageY;
    currentX = startX;
    currentY = startY;
    track.classList.add('dragging');
  }

  function dragMove(e) {
    if (!isDragging) return;
    currentX = e.touches[0].pageX;
    currentY = e.touches[0].pageY;
    const diffX = currentX - startX;
    const diffY = currentY - startY;

    if (Math.abs(diffX) > Math.abs(diffY)) {
      if (e.cancelable) e.preventDefault();
      const currentOffset = -currentIndex * container.clientWidth;
      track.style.transform = `translateX(${currentOffset + diffX}px)`;
    }
  }

  function dragEnd() {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('dragging');
    const diffX = currentX - startX;
    const threshold = container.clientWidth * 0.18;

    if (diffX < -threshold) {
      updateCarousel((currentIndex + 1) % destaques.length);
    } else if (diffX > threshold) {
      updateCarousel((currentIndex - 1 + destaques.length) % destaques.length);
    } else {
      updateCarousel(currentIndex);
    }
    resetAutoplay();
  }

  container.addEventListener('touchstart', dragStart, { passive: true });
  container.addEventListener('touchmove', dragMove, { passive: false });
  container.addEventListener('touchend', dragEnd);

  dots.forEach(dot => {
    dot.addEventListener('click', function() { 
      updateCarousel(parseInt(this.getAttribute('data-index'))); 
      resetAutoplay(); 
    });
  });

  startAutoplay();
}

function initSearch() {
  const overlayInner = document.querySelector('.search__overlay-inner');
  if (!overlayInner) return;
  overlayInner.innerHTML = `<input type="text" id="custom-search-input" placeholder="Digite para buscar crônicas..." autocomplete="off"><div id="custom-search-results"></div>`;
  const searchInput = document.getElementById("custom-search-input");
  const searchResults = document.getElementById("custom-search-results");
  let searchIndex = [];
  const jsonLink = document.querySelector('link[type="application/json"]');
  const feedUrl = jsonLink ? jsonLink.getAttribute('href') : './feed.json';
  fetch(feedUrl).then(r => r.json()).then(data => searchIndex = data.items);
  
  searchInput.addEventListener("input", function () {
    const query = searchInput.value.toLowerCase().trim();
    searchResults.innerHTML = "";
    if (query.length < 2) return;
    const filtered = searchIndex.filter(post => post.title.toLowerCase().includes(query) || post.content_html.toLowerCase().includes(query));
    filtered.forEach(post => {
      const item = document.createElement("div");
      item.className = "custom-search-item";
      item.innerHTML = `<h3><a href="${post.url}">${post.title}</a></h3>`;
      searchResults.appendChild(item);
    });
  });
